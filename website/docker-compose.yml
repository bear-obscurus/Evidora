name: evidora

services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      # Read-only Mount des Service-Account-JSONs für GDELT BigQuery.
      # Auf prod wird ./secrets/ mit chmod 600 gepflegt; in der lokalen
      # Entwicklung kann das Verzeichnis leer sein (Service skippt dann).
      - ./secrets:/app/secrets:ro
      # Static-First-Daten als rw-Mount (wiederhergestellt 2026-07-02):
      # (1) Hot-Reload — data/*.json-Edits + git pull wirken ohne Rebuild
      #     (mtime-aware Cache, ARCHITECTURE §4.1); ohne Mount sind die
      #     Daten ins Image eingebacken und Pull-Änderungen erreichen den
      #     Container nie. (2) Generierte Caches (cordis_projects_slim,
      #     claimreview_index) + Cron-Refreshes (refresh_cordis,
      #     refresh_eurostat_crime via run_evidora_tool.sh) überleben
      #     Rebuilds, statt bei jedem --build verloren zu gehen.
      - ./backend/data:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # Security hardening (H4a-c, 2026-05-08)
    mem_limit: 4g
    memswap_limit: 4g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # (cap_add: DAC_OVERRIDE entfernt 2026-07-02 — H4e non-root uid 1000
    # hat native Schreibrechte auf den burrito-owned data-Mount.)
    # H4d (2026-07-02): unveränderliches Root-FS. Verifiziert: der Prozess
    # schreibt zur Laufzeit ausschließlich nach /app/data (rw-Mount);
    # tmpfs nur als Sicherheitsnetz für Temp-/Home-Pfade.
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /home/evidora:size=16m,uid=1000,gid=1000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/legal')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    # Security hardening (H4a-c, 2026-05-08)
    mem_limit: 512m
    memswap_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN            # nginx initial PID file ownership
      - SETUID           # nginx master → worker privilege drop
      - SETGID           # nginx master → worker privilege drop
      - NET_BIND_SERVICE # bind to port 80
    # H4d (2026-07-02): Root-FS read-only; nginx braucht nur Cache/PID/Temp.
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=64m
      - /var/run:size=8m
      - /tmp:size=16m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
