name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  topic-match-unit-tests:
    name: Unit tests (topic_match helper)
    runs-on: ubuntu-latest

    # The full pytest suite needs SpaCy models + sentence-transformers
    # (~500 MB of downloads). For CI we run the topic_match unit tests
    # only — they're standalone, ~2 s, and pin the central helper that
    # ten static-first services delegate to. A regression there breaks
    # every static-first topic at once, so this is the highest-value
    # test for a PR check.

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-timeout httpx

      - name: Run topic_match unit tests
        working-directory: website/backend
        run: python -m pytest tests/test_topic_match.py -v

  check-new-urls:
    name: New URLs in data/*.json must work
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    # Diff-basierter URL-Check: nur die URLs prüfen, die in diesem PR
    # neu hinzugekommen sind. Alte URLs werden vom periodischen Voll-
    # Audit (cron-Job auf prod) gehandhabt — dieses Gate soll PRs nicht
    # blockieren wegen Tot-Links, die schon vor dem PR existierten.
    #
    # Klassifizierung:
    #   OK       2xx/3xx — alles gut
    #   DEAD     404/410 — echt tot, Gate failed
    #   BLOCKED  403 — Bot-Filter, Browser-OK probable, nur Warnung
    #   TIMEOUT  transient, nur Warnung
    # Exit-Code != 0 nur bei DEAD.

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need full history for diff

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install httpx

      - name: Check newly-added URLs in data/*.json
        working-directory: website/backend
        run: |
          python3 tools/check_new_urls.py \
            --base origin/${{ github.base_ref }} \
            --head HEAD
