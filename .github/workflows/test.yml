name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  light-unit-tests:
    name: Unit tests (dependency-light suites)
    runs-on: ubuntu-latest

    # The full pytest suite needs SpaCy models + sentence-transformers
    # (~500 MB of downloads). For CI we run every suite that works with
    # just pytest + httpx — no models, no network, <2 s total:
    #   - test_topic_match            (trigger helper, 10+ services)
    #   - test_verdict_postprocess_golden  (override cascade, 54 cases)
    #   - test_struct_provenance      (STRUKTURELL provenance gate)
    #   - test_konsens_exact_only     (pack trigger battery + exact-only
    #                                  contract, #41)
    #   - test_cordis_zip_formats     (CORDIS bulk-ZIP parser)
    #   - test_prompt_injection       (Synthesizer <claim>-Injection-Guard)
    #   - test_ratelimit              (X-Real-IP-Keying + Store-Eviction)
    #   - test_eurostat_fertility     (demo_find/TOTFERRT, kein demo_frate)
    #   - test_fmt                    (de_int crash-sichere Zahl-Formatierung)
    #   - test_worldbank_indicators   (keine archivierten/leeren WB-Codes)
    #   - test_dbnomics_providers     (keine Phantom-Provider, Filter nicht-leerend)
    #   - test_oecd_pinned_keys       (SDMX-Keys gepinnt statt '/all')
    #   - test_feed_claim_filter      (Mimikama/AT-RSS: kein Feed-Dump
    #                                  in Stream/Export, Klassiker bleiben)
    #   - test_claim_centered_snippet (claim-relevanteste Sätze statt
    #                                  Textanfang beim 400-Zeichen-Cap)
    #   - test_drug_synonyms          (Marken→INN-Expansion Voltadol→
    #                                  Diclofenac für Medizin-Fachquellen)
    #   - test_conspiracy_triggers    (Schattenregierungs-Paraphrasen +
    #                                  Antisemitismus false@0.9-Direktive)
    #   - test_export_sanitize        (interne Marker/Direktiven raus aus
    #                                  user-sichtbarem Quellen-Export)
    #   - test_confidence_pack_cap    (Evidence-Strength-Cap pack-bewusst —
    #                                  Pack-Direktive false@0.9 kommt durch)
    #   - test_volkskanzler_fact      (deskriptiver Kickl-Fakt: Trigger eng,
    #                                  Guardrails, Direktive nur im Prompt)
    #   - test_diclofenac_niere_fact  (Voltadol/Diclofenac-Nieren: mixed +
    #                                  Gel-vs-Tabletten-Nuance, kein pauschal true)
    #   - test_cetirizin_sedierung_fact (Zyrtec/Cetirizin-Schläfrigkeit: mixed,
    #                                  Headline trägt teils-teils, kein Override-Token)
    #   - test_at_factbook_bevoelkerung (Bevölkerungs-Fakt: Summen-Beweis,
    #                                  Rang-Monotonie, Wien>1/3, endgültig-Pins)
    #   - test_st_model_revision      (ST-Revision-Pin Code==Dockerfile-Bake,
    #                                  Build-Gate testet echten Ladepfad)
    #   - test_kurz_orf_facts         (Kurz-Freispruch + ORF-Beitrag-Fakten,
    #                                  Adverb-Falle 'kurz nach' gebannt)
    #   - test_holocaust_denial_fact  (Leugnungs-Fakt false@0.95 + § 3h,
    #                                  legitime Geschichtsforschung leakt nicht)
    #   - test_steuerlast_fact        (Reiche-vs-Mittelschicht mixed +
    #                                  Einkommen/Vermögen-Metriken getrennt)
    #   - test_pack_marker_drift      (Contract: Pack-source-Namen +
    #                                  Dispatch-Labels vs. AUTHORITATIVE_
    #                                  PACK_MARKERS, keine toten Marker/
    #                                  Direktiven — #73-Follow-up)
    #   - test_verdict_numeric_patterns (L4-Muster G/H/I/J: Vergleich/
    #                                  Schwelle/Verhältnis/Top-N numerisch
    #                                  + Negations-Gates — QA50B)
    #   - test_qa50b_rest             (Orbán-regiert-Trigger, AT-Steuerlast-
    #                                  Ranking-Fakt, Wien-Wahl 2025 GRW_W)
    # Together these pin the trigger logic AND the verdict pipeline —
    # a regression in either breaks many claims at once, so this is
    # the highest-value coverage a PR check can buy at this cost.
    # (Extended 2026-07-02 from topic_match-only, 36 → ~140 tests.)

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-timeout httpx

      - name: Run dependency-light unit suites
        working-directory: website/backend
        run: |
          python -m pytest \
            tests/test_topic_match.py \
            tests/test_verdict_postprocess_golden.py \
            tests/test_struct_provenance.py \
            tests/test_konsens_exact_only.py \
            tests/test_cordis_zip_formats.py \
            tests/test_freshness_cache_health.py \
            tests/test_sipri_percapita.py \
            tests/test_prompt_injection.py \
            tests/test_ratelimit.py \
            tests/test_eurostat_fertility.py \
            tests/test_fmt.py \
            tests/test_worldbank_indicators.py \
            tests/test_dbnomics_providers.py \
            tests/test_oecd_pinned_keys.py \
            tests/test_feed_claim_filter.py \
            tests/test_claim_centered_snippet.py \
            tests/test_drug_synonyms.py \
            tests/test_conspiracy_triggers.py \
            tests/test_export_sanitize.py \
            tests/test_confidence_pack_cap.py \
            tests/test_volkskanzler_fact.py \
            tests/test_diclofenac_niere_fact.py \
            tests/test_cetirizin_sedierung_fact.py \
            tests/test_at_factbook_bevoelkerung.py \
            tests/test_st_model_revision.py \
            tests/test_kurz_orf_facts.py \
            tests/test_holocaust_denial_fact.py \
            tests/test_steuerlast_fact.py \
            tests/test_pack_marker_drift.py \
            tests/test_verdict_numeric_patterns.py \
            tests/test_qa50b_rest.py

  check-new-urls:
    name: New URLs in data/*.json must work
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    # Diff-basierter URL-Check: nur die URLs prüfen, die in diesem PR
    # neu hinzugekommen sind. Alte URLs werden vom periodischen Voll-
    # Audit (cron-Job auf prod) gehandhabt — dieses Gate soll PRs nicht
    # blockieren wegen Tot-Links, die schon vor dem PR existierten.
    #
    # Klassifizierung:
    #   OK       2xx/3xx — alles gut
    #   DEAD     404/410 — echt tot, Gate failed
    #   BLOCKED  403 — Bot-Filter, Browser-OK probable, nur Warnung
    #   TIMEOUT  transient, nur Warnung
    # Exit-Code != 0 nur bei DEAD.

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need full history for diff

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install httpx

      - name: Check newly-added URLs in data/*.json
        working-directory: website/backend
        run: |
          python3 tools/check_new_urls.py \
            --base origin/${{ github.base_ref }} \
            --head HEAD
